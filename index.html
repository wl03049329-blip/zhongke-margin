<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#16894f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OP毛利試算" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>OP 中科毛利率試算器</title>
  <style>
    :root{
      --op:#16894f;
      --op-dark:#0d6338;
      --op-soft:#e9f7ef;
      --op-line:#cbe8d7;
      --cream:#fff8df;
      --red:#ffe4e4;
      --red-text:#a92b2b;
      --amber:#fff1c9;
      --amber-text:#8b5b00;
      --text:#15231b;
      --muted:#6d7b72;
      --card:rgba(255,255,255,.92);
      --bg:#eef5f0;
      --line:#dbe8df;
      --shadow:0 16px 42px rgba(18,75,45,.10);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{background:var(--bg)}
    body{
      margin:0;
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI","Noto Sans TC",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% -10%, rgba(22,137,79,.20), transparent 35%),
        radial-gradient(circle at 100% 8%, rgba(77,181,120,.14), transparent 30%),
        linear-gradient(180deg,#f8fcf9 0%,var(--bg) 100%);
    }
    .app{
      max-width:650px;
      margin:0 auto;
      padding:calc(14px + env(safe-area-inset-top)) 14px calc(30px + env(safe-area-inset-bottom));
    }
    .topbar{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      padding:22px 20px 20px;
      margin-bottom:14px;
      color:#fff;
      background:linear-gradient(145deg,var(--op-dark),var(--op) 64%,#2aae6b);
      box-shadow:0 18px 45px rgba(13,99,56,.28);
    }
    .topbar:after{
      content:"";
      position:absolute;
      right:-44px; top:-50px;
      width:180px; height:180px;
      border:34px solid rgba(255,255,255,.09);
      border-radius:50%;
    }
    .brand{
      display:flex;align-items:center;gap:12px;position:relative;z-index:1;
    }
    .logo{
      width:48px;height:48px;border-radius:15px;background:#fff;color:var(--op);
      display:grid;place-items:center;font-size:22px;font-weight:900;
      box-shadow:0 8px 22px rgba(0,0,0,.14);
    }
    .title h1{font-size:21px;line-height:1.25;margin:0 0 4px}
    .title p{font-size:12px;margin:0;opacity:.84}
    .version{
      position:absolute;right:18px;bottom:18px;z-index:1;
      font-size:11px;font-weight:800;letter-spacing:.5px;
      background:rgba(255,255,255,.16);
      padding:6px 9px;border:1px solid rgba(255,255,255,.20);border-radius:999px;
    }
    .card{
      background:var(--card);
      border:1px solid rgba(255,255,255,.9);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border-radius:24px;
      padding:17px;
      margin-bottom:13px;
      box-shadow:var(--shadow);
    }
    .section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}
    .section-head h2{font-size:16px;margin:0}
    .badge{
      font-size:11px;font-weight:800;color:var(--op-dark);
      background:var(--op-soft);border:1px solid var(--op-line);
      padding:6px 9px;border-radius:999px;
    }
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
    .field{position:relative}
    .field.full{grid-column:1/-1}
    label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin:0 0 6px 2px}
    .input-wrap{position:relative}
    input{
      width:100%;
      appearance:none;
      border:1.5px solid #ead891;
      border-radius:16px;
      background:var(--cream);
      color:var(--text);
      font-size:21px;
      font-weight:750;
      padding:14px 42px 14px 13px;
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
      transition:.18s ease;
    }
    input:focus{
      border-color:var(--op);
      background:#fffdf4;
      box-shadow:0 0 0 4px rgba(22,137,79,.11);
      transform:translateY(-1px);
    }
    .unit{
      position:absolute;right:13px;top:50%;transform:translateY(-50%);
      color:#8b8f86;font-size:13px;font-weight:800;pointer-events:none;
    }
    .quick{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:10px}
    button{
      appearance:none;border:0;cursor:pointer;
      min-height:42px;border-radius:14px;
      background:#edf3ef;color:#315d43;
      font-size:13px;font-weight:850;
      transition:transform .12s ease, filter .12s ease;
    }
    button:active{transform:scale(.96);filter:brightness(.96)}
    button.primary{
      color:#fff;
      background:linear-gradient(135deg,var(--op-dark),var(--op));
      box-shadow:0 8px 18px rgba(22,137,79,.22);
    }
    button.clear{grid-column:span 2;background:#f2f4f2;color:#657268}
    .result-card{
      position:relative;overflow:hidden;
      padding:22px 18px 19px;
      border-radius:22px;
      background:linear-gradient(145deg,#0f7542,#1aa45d);
      color:#fff;
      text-align:center;
      margin-bottom:13px;
      box-shadow:0 14px 30px rgba(20,124,69,.24);
      transition:background .25s ease, transform .25s ease;
    }
    .result-card:before{
      content:"";position:absolute;inset:auto -25px -65px auto;
      width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.10);
    }
    .result-card small{position:relative;display:block;font-size:12px;opacity:.82;margin-bottom:6px}
    .result-card strong{
      position:relative;display:block;
      font-size:44px;line-height:1;font-weight:900;letter-spacing:-1.5px;
      font-variant-numeric:tabular-nums;
    }
    .result-card .sub{
      position:relative;margin-top:10px;font-size:12px;opacity:.86;
    }
    .result-card.pulse strong{animation:pop .28s cubic-bezier(.2,.9,.25,1.3)}
    @keyframes pop{
      0%{transform:scale(.88);opacity:.5}
      100%{transform:scale(1);opacity:1}
    }
    .result-card.warn{background:linear-gradient(145deg,#d89500,#f3b52b);color:#342300}
    .result-card.danger{background:linear-gradient(145deg,#b92e2e,#e05151)}
    .rows{display:grid;gap:2px}
    .row{
      display:flex;justify-content:space-between;align-items:center;gap:14px;
      min-height:49px;padding:9px 2px;border-bottom:1px solid var(--line);
    }
    .row:last-child{border-bottom:0}
    .row span:first-child{font-size:13px;color:var(--muted)}
    .value{font-weight:900;font-size:16px;font-variant-numeric:tabular-nums}
    .price-highlight{color:var(--op-dark)}
    .tip{
      display:flex;gap:9px;align-items:flex-start;
      margin-top:12px;padding:10px 11px;border-radius:14px;
      background:#f4f8f5;color:#68756c;font-size:11px;line-height:1.55;
    }
    .tip i{font-style:normal}
    footer{
      text-align:center;padding:10px 4px 0;color:#7d8a81;font-size:11px;line-height:1.8;
    }
    footer strong{display:block;color:var(--op-dark);font-size:12px}
    .privacy{opacity:.82}
    @media(max-width:470px){
      .grid{grid-template-columns:1fr}
      .field.full{grid-column:auto}
      .quick{grid-template-columns:repeat(3,1fr)}
      button.clear{grid-column:span 3}
      .version{position:static;display:inline-block;margin-top:14px}
      .topbar{padding-bottom:18px}
    }
    @media(prefers-reduced-motion:reduce){
      *{animation:none!important;transition:none!important}
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">OP</div>
        <div class="title">
          <h1>OP 中科毛利率試算器</h1>
          <p>售價正算・目標毛利回推</p>
        </div>
      </div>
      <div class="version">VERSION 2.0</div>
    </header>

    <section class="card">
      <div class="section-head">
        <h2>試算資料</h2>
        <span class="badge">即時計算</span>
      </div>

      <div class="grid">
        <div class="field">
          <label for="price">手動售價（含稅）</label>
          <div class="input-wrap">
            <input id="price" type="number" inputmode="decimal" step="0.01" value="94.5">
            <span class="unit">元</span>
          </div>
        </div>

        <div class="field">
          <label for="cost">商品成本</label>
          <div class="input-wrap">
            <input id="cost" type="number" inputmode="decimal" step="0.01" value="40.7">
            <span class="unit">元</span>
          </div>
        </div>

        <div class="field">
          <label for="pxMargin">全聯毛利率</label>
          <div class="input-wrap">
            <input id="pxMargin" type="number" inputmode="decimal" step="0.01" value="24.68">
            <span class="unit">%</span>
          </div>
        </div>

        <div class="field">
          <label for="companyFee">公司費用率</label>
          <div class="input-wrap">
            <input id="companyFee" type="number" inputmode="decimal" step="0.01" value="10.95">
            <span class="unit">%</span>
          </div>
        </div>

        <div class="field full">
          <label for="targetMargin">目標中科毛利率（留白即用手動售價正算）</label>
          <div class="input-wrap">
            <input id="targetMargin" type="number" inputmode="decimal" step="0.01" placeholder="例如 35">
            <span class="unit">%</span>
          </div>
          <div class="quick">
            <button data-target="26">26%</button>
            <button data-target="28">28%</button>
            <button data-target="30">30%</button>
            <button data-target="32">32%</button>
            <button data-target="35" class="primary">35%</button>
            <button data-target="40">40%</button>
            <button id="clearTarget" class="clear">清除回推，改用手動售價</button>
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>試算結果</h2>
        <span id="modeBadge" class="badge">正算模式</span>
      </div>

      <div id="hero" class="result-card">
        <small id="heroLabel">中科毛利率</small>
        <strong id="heroValue">—</strong>
        <div id="heroSub" class="sub">輸入資料後自動更新</div>
      </div>

      <div class="rows">
        <div class="row"><span>實際採用售價（含稅）</span><span class="value price-highlight" id="activePrice">—</span></div>
        <div class="row"><span>未稅售價</span><span class="value" id="untaxedPrice">—</span></div>
        <div class="row"><span>公司出貨價（未稅）</span><span class="value" id="shipPrice">—</span></div>
        <div class="row"><span>公司費用</span><span class="value" id="feeAmount">—</span></div>
        <div class="row"><span>中科毛利額</span><span class="value" id="profitAmount">—</span></div>
      </div>

      <div class="tip">
        <i>●</i>
        <span>毛利率低於 26% 顯示紅色；26%～29.99% 顯示黃色；30%以上顯示綠色。</span>
      </div>
    </section>

    <footer>
      <strong>OP 中科毛利率試算器</strong>
      Version 2.0<br>
      Developed by 弘昇<br>
      <span class="privacy">所有資料只在你的裝置上計算，不會上傳。</span>
    </footer>
  </main>

<script>
const ids = ["price","cost","pxMargin","companyFee","targetMargin"];
const $ = id => document.getElementById(id);
const num = id => parseFloat($(id).value);
const money = v => Number.isFinite(v)
  ? v.toLocaleString("zh-TW",{minimumFractionDigits:2,maximumFractionDigits:2})
  : "—";

let lastMarginText = "";

function animateResult(){
  const hero = $("hero");
  hero.classList.remove("pulse");
  void hero.offsetWidth;
  hero.classList.add("pulse");
}

function calc(){
  const price = num("price");
  const cost = num("cost");
  const px = num("pxMargin") / 100;
  const fee = num("companyFee") / 100;
  const targetRaw = $("targetMargin").value.trim();
  const target = targetRaw === "" ? null : parseFloat(targetRaw) / 100;

  let active = price;
  if(target !== null){
    const denominator = (1 - fee - target) * (1 - px);
    active = denominator > 0 ? cost / denominator * 1.05 : NaN;
  }

  const untaxed = active / 1.05;
  const ship = untaxed * (1 - px);
  const feeAmount = ship * fee;
  const profit = ship - feeAmount - cost;
  const margin = ship ? profit / ship : NaN;
  const marginText = Number.isFinite(margin) ? (margin * 100).toFixed(2) + "%" : "條件無法計算";

  $("activePrice").textContent = money(active) + (Number.isFinite(active) ? " 元" : "");
  $("untaxedPrice").textContent = money(untaxed) + (Number.isFinite(untaxed) ? " 元" : "");
  $("shipPrice").textContent = money(ship) + (Number.isFinite(ship) ? " 元" : "");
  $("feeAmount").textContent = money(feeAmount) + (Number.isFinite(feeAmount) ? " 元" : "");
  $("profitAmount").textContent = money(profit) + (Number.isFinite(profit) ? " 元" : "");
  $("heroValue").textContent = marginText;
  $("heroLabel").textContent = target === null ? "中科毛利率" : "回推後中科毛利率";
  $("heroSub").textContent = target === null
    ? "依手動售價計算"
    : "目標 " + (target * 100).toFixed(2) + "%，自動回推售價";
  $("modeBadge").textContent = target === null ? "正算模式" : "回推模式";

  const hero = $("hero");
  hero.className = "result-card";
  if(!Number.isFinite(margin) || margin < .26) hero.classList.add("danger");
  else if(margin < .30) hero.classList.add("warn");

  if(marginText !== lastMarginText){
    animateResult();
    lastMarginText = marginText;
  }

  localStorage.setItem(
    "marginCalcV2",
    JSON.stringify(Object.fromEntries(ids.map(id => [id, $(id).value])))
  );
}

ids.forEach(id => $(id).addEventListener("input", calc));
document.querySelectorAll("[data-target]").forEach(btn => {
  btn.addEventListener("click", () => {
    $("targetMargin").value = btn.dataset.target;
    calc();
  });
});
$("clearTarget").addEventListener("click", () => {
  $("targetMargin").value = "";
  calc();
  $("price").focus();
});

try{
  const saved = JSON.parse(localStorage.getItem("marginCalcV2") || "null");
  if(saved) ids.forEach(id => {
    if(saved[id] !== undefined) $(id).value = saved[id];
  });
}catch(e){}

calc();

if("serviceWorker" in navigator){
  window.addEventListener("load", () => navigator.serviceWorker.register("service-worker.js"));
}
</script>
</body>
</html>
